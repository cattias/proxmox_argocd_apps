apiVersion: k8up.io/v1
kind: Schedule
metadata:
  name: seerr-nfs-backup
  namespace: arr
spec:
  backup:
    schedule: "25 0 * * *"
    failedJobsHistoryLimit: 2
    successfulJobsHistoryLimit: 2
    concurrentRunsAllowed: false
    promURL: http://prometheus-pushgateway.monitoring.svc.cluster.local:9091
    labelSelectors:
      - matchExpressions:
        - key: backupseerr
          operator: In
          values:
            - "true"
    volumes:
      - name: nas-repo
        persistentVolumeClaim:
          claimName: arr-backup-pvc
  prune:
    schedule: "0 4 * * 0"
    retention:
      keepDaily: 7
      keepWeekly: 4
      keepMonthly: 6
    volumes:
      - name: nas-repo
        persistentVolumeClaim:
          claimName: arr-backup-pvc
  podConfigRef:
    name: nas-backup-pod-config
  backend:
    repoPasswordSecretRef:
      name: backup-repo-secret
      key: password
    local:
      mountPath: "/mnt/backup-repository"
    volumeMounts:
      - name: nas-repo
        mountPath: "/mnt/backup-repository"
        subPath: seerr_restic
---
apiVersion: k8up.io/v1
kind: PodConfig
metadata:
  name: nas-backup-pod-config
  namespace: arr
spec:
  template:
    spec:
      containers:
        - name: backup-arr
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
---
apiVersion: k8up.io/v1
kind: PreBackupPod
metadata:
  name: seerr-db-freeze
  namespace: arr
  labels:
    backupseerr: "true"
spec:
  backupCommand: |-
    sh -c "sqlite3 /data/db/db.sqlite3 .dump"
  pod:
    spec:
      containers:
        - name: sqlite-dumper
          image: nouchka/sqlite3:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c", "sleep infinity"]
          volumeMounts:
            - name: seerr-config
              mountPath: /data
      volumes:
        - name: seerr-config
          persistentVolumeClaim:
            claimName: seerr-config-pvc