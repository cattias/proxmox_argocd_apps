apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: seerr
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  syncPolicy:
    automated:
      prune: true
      enabled: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true
  destination:
    namespace: arr
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: oci://ghcr.io/seerr-team/seerr/seerr-chart
    targetRevision: 3.5.0
    chart: seerr
    helm:
      valuesObject:
        image:
          registry: ghcr.io
          repository: seerr-team/seerr
          tag: v3.2.0
        config:
          persistence:
            existingClaim: seerr-config-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seerr-config-pvc
  namespace: arr
  labels:
    backupseerr: "true"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: proxmox-ceph
  resources:
    requests:
      storage: 5Gi