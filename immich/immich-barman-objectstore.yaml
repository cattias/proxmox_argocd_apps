apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: immich-backup-store
  namespace: photos
spec:
  retentionPolicy: "7d"
  configuration:
    destinationPath: s3://backup-immich
    endpointURL: http://192.168.178.69:7480
    s3Credentials:
      accessKeyId:
        name: barman-secret
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: barman-secret
        key: ACCESS_SECRET_KEY
    wal:
      compression: gzip