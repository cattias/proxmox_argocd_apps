apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-db
  namespace: photos
spec:
  instances: 2

  primaryUpdateStrategy: unsupervised

  storage:
    size: 50Gi
    storageClass: proxmox-ceph

  plugins:
  - name: barman-cloud.cloudnative-pg.io
    enabled: true
    isWALArchiver: true
    parameters:
      barmanObjectName: immich-backup-store

  monitoring:
    enablePodMonitor: false

  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:18.3

  postgresql:
    shared_preload_libraries:
      - "vchord.so"

  bootstrap:
    initdb:
      postInitApplicationSQL:
        - CREATE EXTENSION vchord CASCADE;
        - CREATE EXTENSION earthdistance CASCADE;
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: immich-db
  namespace: photos
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: immich-db
  podMetricsEndpoints:
  - port: metrics