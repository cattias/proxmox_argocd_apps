apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: vaultwarden-db
  namespace: vaultwarden
spec:
  instances: 2
  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ClusterImageCatalog
    name: postgresql-standard-trixie
    major: 18

  primaryUpdateStrategy: unsupervised

  bootstrap:
    recovery:
      source: legacy-nas-source
      backupID: "20260306T000002" # Explicitly use the latest one you have

  externalClusters:
    - name: legacy-nas-source
      barmanObjectStore: # Simplified reference to the same ObjectStore
        destinationPath: s3://backup-vaultwarden
        endpointURL: http://192.168.178.69:7480
        s3Credentials:
          accessKeyId:
            name: barman-secret
            key: ACCESS_KEY_ID
          secretAccessKey:
            name: barman-secret
            key: ACCESS_SECRET_KEY
        wal:
          compression: gzip
        serverName: vaultwarden-db

  storage:
    size: 5Gi
    storageClass: proxmox-ceph

  plugins:
  - name: barman-cloud.cloudnative-pg.io
    enabled: true
    isWALArchiver: true
    parameters:
      barmanObjectName: vaultwarden-backup-store

  monitoring:
    enablePodMonitor: false
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: vaultwarden-db
  namespace: vaultwarden
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: vaultwarden-db
  podMetricsEndpoints:
  - port: metrics