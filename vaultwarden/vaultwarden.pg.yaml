apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: vaultwarden-db
  namespace: vaultwarden
spec:
  instances: 2
  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ClusterImageCatalog
    name: postgresql-standard-trixie
    major: 18

  primaryUpdateStrategy: unsupervised

  # bootstrap:
  #   recovery:
  #     source: legacy-nas-source
  #     recoveryTarget:
  #       backupID: "20260306T000002"
  #       targetImmediate: true
  #       exclusive: true

  # externalClusters:
  #   - name: legacy-nas-source
  #     # CHANGE THIS SECTION: Use 'plugin' instead of 'barmanObjectStore'
  #     plugin:
  #       name: barman-cloud.cloudnative-pg.io
  #       parameters:
  #         # This must match the name of your ObjectStore CRD
  #         barmanObjectName: vaultwarden-backup-store 
  #         # This must match the folder name in S3
  #         serverName: vaultwarden-db

  storage:
    size: 5Gi
    storageClass: proxmox-ceph

  plugins:
  - name: barman-cloud.cloudnative-pg.io
    enabled: true
    isWALArchiver: true
    parameters:
      barmanObjectName: vaultwarden-backup-store

  monitoring:
    enablePodMonitor: false
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: vaultwarden-db
  namespace: vaultwarden
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: vaultwarden-db
  podMetricsEndpoints:
  - port: metrics