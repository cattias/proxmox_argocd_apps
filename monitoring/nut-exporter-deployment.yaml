apiVersion: apps/v1
kind: Deployment
metadata:
  name: nut-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: nut-exporter
spec:
  revisionHistoryLimit: 1
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: nut-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nut-exporter
    spec:
      hostNetwork: true
      containers:
        - name: nut-exporter
          image: ghcr.io/druggeri/nut_exporter:3.2.5
          imagePullPolicy: IfNotPresent
          env:
            - name: NUT_EXPORTER_SERVER
              value: "192.168.178.69"
            - name: NUT_EXPORTER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: nut-secret
                  key: NUT_EXPORTER_USERNAME
            - name: NUT_EXPORTER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nut-secret
                  key: NUT_EXPORTER_PASSWORD
          ports:
          - containerPort: 9199
            name: http
            protocol: TCP

          livenessProbe:
            httpGet:
              path: /ups_metrics
              port: http
            initialDelaySeconds: 10
            failureThreshold: 5
            timeoutSeconds: 2

          readinessProbe:
            httpGet:
              path: /ups_metrics
              port: http
            initialDelaySeconds: 10
            failureThreshold: 5
            timeoutSeconds: 2
