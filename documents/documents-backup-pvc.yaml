apiVersion: v1
kind: PersistentVolume
metadata:
  name: documents-backup-pv
spec:
  capacity:
    storage: 10Ti
  accessModes: [ReadWriteMany]
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: documents-nas-backup-share
    volumeAttributes:
      server: 192.168.178.33
      share: /volume1/backup
  mountOptions:
    # - nfsvers=4.1
    - hard
    - noac
    - timeo=600
    - retrans=2
    - noatime
    - tcp
    - nolock
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: documents-backup-pvc
  namespace: documents
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 10Ti
  volumeName: documents-backup-pv
  storageClassName: ""