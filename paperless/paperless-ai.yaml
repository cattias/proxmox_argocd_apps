apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-ai
  namespace: documents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paperless-ai
  template:
    metadata:
      labels:
        app: paperless-ai
    spec:
      containers:
      - name: paperless-ai
        image: clusterzx/paperless-ai:3.0.9
        ports:
        - containerPort: 3000
          name: http
        env:
        # --- Paperless-ngx Connection ---
        - name: PAPERLESS_URL
          value: "http://paperless-ngx-service:80" # Internal K8s service name
        - name: PAPERLESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: paperless-openid-secret
              key: token 

        # --- Ollama Configuration ---
        - name: PAPERLESS_AI_PROVIDER
          value: "ollama"
        - name: PAPERLESS_AI_OLLAMA_HOST
          value: "http://192.168.178.82:11434"
        - name: PAPERLESS_AI_OLLAMA_MODEL
          value: "mistral:7b"  # Fast model for initial tagging/OCR correction
        - name: PAPERLESS_AI_OLLAMA_CHAT_MODEL
          value: "mistral-small:24b" # Heavy model for natural language questions
        - name: PAPERLESS_AI_PROMPT_LANGUAGE
          value: "French and German" # Explicitly tell the AI to expect these languages

        # --- Performance & UI ---
        - name: PAPERLESS_AI_PORT
          value: "3000"
        - name: TZ
          value: "Europe/Paris"
          
        volumeMounts:
        - name: ai-data
          mountPath: /app/data
      
      volumes:
      - name: ai-data
        persistentVolumeClaim:
          claimName: paperless-ai-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: paperless-ai-service
  namespace: documents
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app: paperless-ai
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-ai-pvc
  namespace: documents
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
  storageClassName: "proxmox-ceph"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: paperless-ai-router
  namespace: documents
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`paperless-ai.attias.io`)
      kind: Rule
      services:
        - name: paperless-ai-service
          port: 80
  tls:
    certResolver: le