apiVersion: v1
kind: Service
metadata:
  name: peanut-service
  namespace: monitoring
spec:
  type: ExternalName
  externalName: 192.168.178.27
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: peanut-router
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`peanut.attias.io`)
      kind: Rule
      services:
        - name: peanut-service
          port: 8080
      priority: 10
  tls:
    certResolver: le