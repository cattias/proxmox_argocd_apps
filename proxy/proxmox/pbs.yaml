apiVersion: v1
kind: Service
metadata:
  name: pbs-service
  namespace: home
spec:
  type: ExternalName
  externalName: 192.168.178.10
  ports:
    - protocol: TCP
      port: 8007
      targetPort: 8007
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pbs-router
  namespace: home
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`pbs.attias.io`)
      kind: Rule
      services:
        - name: pbs-service
          port: 8007
          scheme: https
          serversTransport: proxmox-insecure-transport
      priority: 10
  tls:
    certResolver: le