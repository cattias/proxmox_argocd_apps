apiVersion: v1
kind: Service
metadata:
  name: hass-service
  namespace: home
spec:
  type: ExternalName
  externalName: 192.168.178.188
  ports:
    - protocol: TCP
      port: 8123
      targetPort: 8123
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hass-router
  namespace: home
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`hass.attias.io`)
      kind: Rule
      services:
        - name: hass-service
          port: 8123
      priority: 10
  tls:
    certResolver: le