apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: nas-insecure-transport
  namespace: nas
spec:
  insecureSkipVerify: true
---
apiVersion: v1
kind: Service
metadata:
  name: nas-ugreen
  namespace: nas
spec:
  type: ExternalName
  externalName: 192.168.178.33
  ports:
    - protocol: TCP
      port: 9443
      targetPort: 9443
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nas-ugreen-router
  namespace: nas
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`nas.attias.io`)
      kind: Rule
      services:
        - name: nas-ugreen
          port: 9443
          scheme: https
          serversTransport: nas-insecure-transport
      priority: 10
