---
- name: "Rolling Update for Homelab"
  hosts: all_nodes
  become: true
  
  tasks:
    - name: "Update APT Cache"
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: "Upgrade all packages"
      ansible.builtin.apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes

