---
- name: "Rolling Update for Homelab"
  hosts: all_nodes
  become: true
  
  tasks:
    - name: "Update APT Cache"
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: "Upgrade all packages"
      ansible.builtin.apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes
      register: apt_result

    - name: "Update Pi-hole Software"
      command: pihole -up --unattended
      when: is_pihole | default(false) == true
      register: pihole_update
      changed_when: "'Everything is up to date' not in pihole_update.stdout"

    - name: Summary
      debug:
        msg: "OS updated: {{ apt_result.changed }}. Pi-hole updated: {{ pihole_update.changed | default('N/A') }}"

